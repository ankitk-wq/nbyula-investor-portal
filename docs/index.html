<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nbyula — Investor Portal · Pre-Series A 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

:root{
  --white:#ffffff; --off:#f7f7f5; --paper:#f2f4f7;
  --ink:#0a0a08; --ink2:#222220; --muted:#6b6b68; --dim:#9f9f9c;
  --border:#e5e5e2; --border2:#d0d0cc;
  --blue:#1a60e8; --blue-l:#eff5ff; --blue-d:#1448b8;
  --green:#12a05c; --green-l:#f0fdf6;
  --red:#d93b3b; --red-l:#fff2f2;
  --amber:#d97706; --amber-l:#fffbeb;
  --navy:#0e2642;
}

body{font-family:'Hanken Grotesk',sans-serif;background:var(--white);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:62px;background:rgba(255,255,255,.94);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2.5rem;
  transition:box-shadow .3s;
}
nav.scrolled{box-shadow:0 4px 24px rgba(0,0,0,.06);}
.nav-logo{display:flex;align-items:center;gap:0;text-decoration:none;}
.nav-links{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;gap:2rem;
}
.nav-links a{
  font-size:.75rem;font-weight:500;color:var(--muted);text-decoration:none;
  transition:color .15s;padding:.25rem 0;position:relative;
}
.nav-links a::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:var(--blue);border-radius:2px;
  transform:scaleX(0);transition:transform .2s;
}
.nav-links a:hover,.nav-links a.active{color:var(--ink);}
.nav-links a:hover::after,.nav-links a.active::after{transform:scaleX(1);}
.nav-right{display:flex;gap:.65rem;align-items:center;}
.btn-ghost{
  font-family:'Hanken Grotesk',sans-serif;font-size:.75rem;font-weight:600;
  padding:.42rem 1.1rem;border-radius:100px;
  border:1.5px solid var(--border2);background:transparent;color:var(--muted);
  cursor:pointer;text-decoration:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px;
}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink);}
.btn-primary{
  font-family:'Hanken Grotesk',sans-serif;font-size:.75rem;font-weight:700;
  padding:.42rem 1.25rem;border-radius:100px;
  background:var(--ink);color:white;border:none;cursor:pointer;
  text-decoration:none;transition:opacity .15s, transform .15s;
  display:inline-flex;align-items:center;gap:6px;
}
.btn-primary:hover{opacity:.82;transform:translateY(-1px);}
.dataroom-btn{
  font-family:'Hanken Grotesk',sans-serif;font-size:.75rem;font-weight:700;
  padding:.42rem 1.25rem;border-radius:100px;
  background:linear-gradient(135deg,var(--blue),#06b6d4);color:white;
  border:none;cursor:pointer;text-decoration:none;
  transition:opacity .15s, transform .15s;
  display:inline-flex;align-items:center;gap:6px;
  box-shadow:0 0 18px rgba(26,96,232,.28);
}
.dataroom-btn:hover{opacity:.85;transform:translateY(-1px);}
.live-dot{width:6px;height:6px;border-radius:50%;background:#34d399;animation:ldPulse 1.6s ease-in-out infinite;}
@keyframes ldPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* ── LAYOUT ── */
.section{padding:6rem 0;}
.section.alt{background:var(--off);}
.section.dark{background:var(--ink);}
.container{max-width:1100px;margin:0 auto;padding:0 2.5rem;}

/* ── SECTION HEADER ── */
.section-kicker{
  font-size:.62rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--blue);margin-bottom:.9rem;
  display:flex;align-items:center;gap:10px;
}
.section-kicker::before{content:'';width:20px;height:2px;background:var(--blue);border-radius:1px;}
.section-title{
  font-size:clamp(1.9rem,3.2vw,2.75rem);font-weight:900;
  letter-spacing:-.03em;line-height:1.08;color:var(--ink);
  margin-bottom:.85rem;
}
.section-sub{font-size:.92rem;color:var(--muted);font-weight:400;line-height:1.75;max-width:580px;}
.section-title .hl{color:var(--blue);}
.section-title .hl-g{color:var(--green);}
.section-title .hl-r{color:var(--red);}
.section-title .hl-a{color:var(--amber);}
.dark .section-title{color:white;}
.dark .section-sub{color:rgba(255,255,255,.5);}
.dark .section-kicker{color:rgba(255,255,255,.35);}
.dark .section-kicker::before{background:rgba(255,255,255,.3);}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.1rem;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:.65rem;}
.g7{display:grid;grid-template-columns:repeat(7,1fr);gap:.75rem;}

/* ── VERTICAL CARDS V2 (per-user, activated vs future) ── */
.vc{background:white;border:1px solid var(--border);border-radius:11px;padding:.9rem .75rem;text-align:center;transition:box-shadow .2s,transform .2s;position:relative;overflow:hidden;}
.vc:hover{box-shadow:0 4px 18px rgba(0,0,0,.08);transform:translateY(-2px);}
.vc.active{border-top:3px solid var(--green);}
.vc.future{background:#fafaf8;border:1px dashed #cbd5e1;}
.vc.future .vc-name,.vc.future .vc-icon{opacity:.78;}
.vc-icon{font-size:1.35rem;margin-bottom:.4rem;line-height:1;}
.vc-name{font-size:.66rem;font-weight:700;color:var(--ink2);margin-bottom:.55rem;line-height:1.3;min-height:1.7rem;}
.vc-stats{display:flex;justify-content:center;gap:.75rem;font-size:.6rem;}
.vc-stat{}
.vc-stat-lbl{color:var(--dim);font-weight:600;letter-spacing:.04em;}
.vc-stat-val{font-weight:800;color:var(--blue);font-size:.78rem;letter-spacing:-.02em;}
.vc.future .vc-stat-val{color:#64748b;}

/* ── CARDS ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.35rem;transition:box-shadow .2s,transform .2s;}
.card:hover{box-shadow:0 4px 22px rgba(0,0,0,.07);transform:translateY(-2px);}
.card.blue{border-color:rgba(26,96,232,.2);background:var(--blue-l);}
.card.green{border-color:rgba(18,160,92,.2);background:var(--green-l);}
.card.amber{border-color:rgba(217,119,6,.2);background:var(--amber-l);}
.card.red{border-color:rgba(217,59,59,.15);background:var(--red-l);}
.card.ink{background:var(--ink);border-color:var(--ink);color:white;}
.card-lbl{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:.5rem;}
.card-val{font-size:2rem;font-weight:900;letter-spacing:-.04em;line-height:1;margin-bottom:.25rem;}
.card-desc{font-size:.72rem;color:var(--muted);}

/* ── VERTICAL CARD V2 (current + potential side-by-side) ── */
.vc2{background:white;border:1px solid var(--border);border-radius:11px;padding:.85rem .7rem;text-align:center;position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s;}
.vc2:hover{box-shadow:0 4px 18px rgba(0,0,0,.08);transform:translateY(-2px);}
.vc2.active{border-top:3px solid var(--green);}
.vc2.future{background:#fafaf8;border:1px dashed #cbd5e1;}
.vc2-icon{font-size:1.2rem;margin-bottom:.3rem;line-height:1;}
.vc2-name{font-size:.65rem;font-weight:700;color:var(--ink2);margin-bottom:.6rem;line-height:1.25;min-height:1.65rem;letter-spacing:-.01em;}
.vc2-pot-row{display:flex;justify-content:space-around;font-size:.6rem;padding:.25rem 0;}
.vc2-pot-row > div{display:flex;flex-direction:column;}
.vc2-cell-lbl{font-size:.5rem;color:var(--dim);font-weight:600;letter-spacing:.04em;}
.vc2-cell-val{font-weight:800;font-size:.78rem;letter-spacing:-.02em;color:#64748b;}
.vc2.active .vc2-cell-val{color:var(--blue);}

/* ── COMPETITIVE MAP & CARDS ── */
.comp-map-wrap{margin:1rem 0 1.25rem;background:var(--off);border-radius:12px;padding:.75rem;border:1px solid var(--border);}
.comp-map{width:100%;height:auto;display:block;}
.comp-dot{transition:transform .25s;cursor:default;transform-origin:center;}
.comp-dot.nbyula circle:first-child{animation:nbyulaPulse 3s ease-in-out infinite;transform-origin:center;transform-box:fill-box;}
@keyframes nbyulaPulse{0%,100%{opacity:.18;}50%{opacity:.32;}}
.comp-map-takeaway{margin-top:1rem;padding:.95rem 1.1rem;background:linear-gradient(135deg,var(--blue-l),transparent);border:1px solid rgba(26,96,232,.18);border-radius:10px;font-size:.85rem;color:var(--ink);line-height:1.6;}
.comp-map-takeaway b{color:var(--blue);font-weight:700;}
.comp-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;margin:1rem 0 1.5rem;}
.comp-card-mini{background:white;border:1px solid var(--border);border-radius:12px;padding:1.05rem 1.1rem;position:relative;display:flex;flex-direction:column;gap:.65rem;transition:box-shadow .15s,transform .2s;}
.comp-card-mini:hover{box-shadow:0 6px 22px rgba(0,0,0,.08);transform:translateY(-2px);}
.comp-card-mini::before{content:"";position:absolute;top:0;left:1.1rem;right:1.1rem;height:2px;background:linear-gradient(90deg,var(--red),rgba(217,59,59,.2));}
.comp-mini-header{display:flex;gap:.65rem;align-items:flex-start;}
.comp-mini-rank{font-family:'Geist Mono',monospace;font-style:italic;font-size:1.35rem;color:var(--dim);opacity:.45;line-height:1;flex-shrink:0;font-weight:600;}
.comp-mini-name{font-weight:800;font-size:.95rem;color:var(--ink);letter-spacing:-.01em;line-height:1.2;}
.comp-mini-meta{font-family:'Geist Mono',monospace;font-size:.58rem;color:var(--muted);margin-top:.18rem;font-weight:500;}
.comp-mini-blocker{background:var(--red-l);border:1px solid rgba(217,59,59,.18);border-radius:7px;padding:.5rem .7rem;font-size:.7rem;font-weight:700;color:var(--red);line-height:1.4;}
.comp-mini-list{display:flex;flex-direction:column;gap:.45rem;}
.comp-mini-list>div{font-size:.7rem;color:var(--muted);line-height:1.55;padding-left:.95rem;position:relative;}
.comp-mini-list>div::before{content:"✗";position:absolute;left:0;top:0;color:var(--red);font-weight:700;font-size:.65rem;opacity:.7;}

/* ── MOAT GRID ── */
.moat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.65rem;margin:1rem 0 1.4rem;}
.moat-item{background:white;border:1px solid rgba(26,96,232,.14);border-radius:10px;padding:.95rem 1.05rem;display:flex;gap:.75rem;align-items:flex-start;}
.moat-icon{font-size:1.3rem;flex-shrink:0;line-height:1;padding-top:.1rem;}
.moat-text{font-size:.78rem;color:var(--muted);line-height:1.6;}
.moat-text b{color:var(--ink);font-weight:700;}
.verdict{margin:1.25rem 0;padding:1.2rem 1.4rem;background:linear-gradient(135deg,var(--blue-l),var(--amber-l));border:1px solid rgba(26,96,232,.18);border-radius:12px;font-size:.92rem;line-height:1.6;color:var(--ink);font-style:italic;}
.verdict b{font-style:normal;font-weight:700;color:var(--blue);}

/* ── TECH BUILD CARDS (Roadmap) ── */
.tech-build-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:1.2rem 0 1.75rem;}
.tech-card{background:white;border:1px solid var(--border);border-radius:14px;padding:1.3rem;display:flex;flex-direction:column;gap:.8rem;transition:box-shadow .2s,transform .2s;}
.tech-card:hover{box-shadow:0 6px 22px rgba(0,0,0,.08);transform:translateY(-2px);}
.tech-card-header{display:flex;align-items:center;justify-content:space-between;}
.tech-card-tag{font-size:.6rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase;padding:.3rem .65rem;border-radius:100px;}
.tech-card-num{font-family:'Geist Mono',monospace;font-style:italic;font-size:1.7rem;color:var(--dim);opacity:.35;line-height:1;font-weight:700;}
.tech-card-title{font-weight:800;font-size:.95rem;color:var(--ink);line-height:1.3;}
.tech-card-desc{font-size:.78rem;color:var(--muted);line-height:1.6;}
.tech-stack-row{display:flex;flex-wrap:wrap;gap:.4rem;}
.tech-chip{font-family:'Geist Mono',monospace;font-size:.6rem;font-weight:600;padding:.25rem .55rem;background:var(--off);border:1px solid var(--border);border-radius:100px;color:var(--muted);white-space:nowrap;}
.tech-card-metric{display:flex;align-items:baseline;gap:.4rem;padding-top:.5rem;border-top:1px solid var(--border);margin-top:auto;}
.tech-metric-val{font-size:1.5rem;font-weight:900;letter-spacing:-.03em;line-height:1;}
.tech-metric-lbl{font-size:.65rem;color:var(--muted);}

/* ── ARCH VISUAL ── */
.arch-visual{background:white;border:1px solid var(--border);border-radius:14px;padding:1.4rem;display:flex;flex-direction:column;gap:0;margin:1rem 0 1.4rem;}
.arch-layer{display:flex;align-items:flex-start;gap:1rem;padding:.7rem 0;}
.arch-layer:not(:last-child){border-bottom:1px solid var(--border);}
.arch-layer-label{font-family:'Geist Mono',monospace;font-size:.6rem;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;min-width:100px;padding-top:.3rem;flex-shrink:0;}
.arch-layer-chips{display:flex;flex-wrap:wrap;gap:.4rem;flex:1;}
.arch-chip{font-size:.7rem;font-weight:600;padding:.3rem .65rem;border-radius:6px;display:inline-flex;align-items:center;gap:.35rem;}
.arch-chip.active{background:var(--blue-l);border:1px solid rgba(26,96,232,.2);color:var(--blue);}
.arch-chip.building{background:var(--amber-l);border:1px solid rgba(217,119,6,.22);color:var(--amber);}
.arch-arrow{text-align:center;color:var(--dim);font-size:.95rem;line-height:1;padding:.05rem 0;}

/* === BENCHMARK COMPARISON TABLES === */
.bench-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-top:1.25rem;}
.bench-card{background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;}
.bench-head{padding:1rem 1.25rem .9rem;border-bottom:1px solid var(--border);}
.bench-eyebrow{font-size:.58rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--blue);margin-bottom:.3rem;}
.bench-title{font-size:.95rem;font-weight:800;color:var(--ink);letter-spacing:-.01em;line-height:1.25;}
.bench-table{width:100%;border-collapse:collapse;font-size:.72rem;}
.bench-table thead th{
  text-align:left;padding:.7rem 1.05rem;background:var(--off);
  font-family:'Geist Mono',monospace;font-size:.55rem;font-weight:800;
  color:var(--dim);letter-spacing:.1em;text-transform:uppercase;
  border-bottom:1px solid var(--border);
}
.bench-table thead th:nth-child(2){color:#9ca3af;}
.bench-table thead th:nth-child(3){color:var(--green);}
.bench-table tbody td{padding:.7rem 1.05rem;border-bottom:1px solid #f4f4f1;line-height:1.5;vertical-align:top;}
.bench-table tbody tr:last-child td{border-bottom:none;}
.bench-table tbody tr.alt td{background:#fbfbf9;}
.bench-table .metric{font-weight:700;color:var(--ink2);font-size:.74rem;letter-spacing:-.005em;}
.bench-table .neutral{color:var(--muted);}
.bench-table .lose{color:var(--red);font-weight:600;}
.bench-table .win{color:var(--green);font-weight:700;}
.bench-table .win strong{color:var(--green);}
.bench-foot{padding:.85rem 1.25rem;background:linear-gradient(135deg,var(--blue-l),transparent);border-top:1px solid var(--border);font-size:.7rem;color:var(--ink2);line-height:1.55;}
.bench-foot b{color:var(--blue);font-weight:700;}
@media (max-width:920px){.bench-grid{grid-template-columns:1fr;}}

/* ── LIQUIDITY METRICS ── */
.liq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem;}
.liq-card{background:white;border:1px solid var(--border);border-radius:14px;padding:1.4rem;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:.5rem;transition:box-shadow .2s,transform .2s;}
.liq-card:hover{box-shadow:0 6px 22px rgba(0,0,0,.08);transform:translateY(-2px);}
.liq-card.live::before{content:"LIVE";position:absolute;top:.85rem;right:.95rem;font-family:'Geist Mono',monospace;font-size:.55rem;font-weight:800;color:var(--green);background:var(--green-l);padding:.2rem .55rem;border-radius:100px;letter-spacing:.1em;border:1px solid rgba(18,160,92,.25);}
.liq-card.coming::before{content:"COMING";position:absolute;top:.85rem;right:.95rem;font-family:'Geist Mono',monospace;font-size:.55rem;font-weight:800;color:var(--dim);background:var(--off);padding:.2rem .55rem;border-radius:100px;letter-spacing:.1em;border:1px solid var(--border);}
.liq-card.coming{opacity:.78;background:#fafaf8;border:1px dashed var(--border2);}
.liq-cat{font-size:.58rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:.2rem;}
.liq-name{font-size:.95rem;font-weight:800;color:var(--ink);letter-spacing:-.01em;line-height:1.25;}
.liq-val{font-size:2.5rem;font-weight:900;letter-spacing:-.04em;line-height:1;color:var(--green);margin:.4rem 0;}
.liq-sub{font-size:.7rem;color:var(--muted);line-height:1.5;margin-bottom:.4rem;}
.liq-pillrow{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:auto;padding-top:.5rem;}
.liq-pill{font-family:'Geist Mono',monospace;font-size:.58rem;font-weight:700;padding:.22rem .55rem;background:var(--off);border:1px solid var(--border);border-radius:100px;color:var(--muted);}
.liq-pill.hi{background:var(--blue-l);color:var(--blue);border-color:rgba(26,96,232,.2);}
.liq-pill.go{background:var(--green-l);color:var(--green);border-color:rgba(18,160,92,.2);}

/* ── STAT ROW ── */
.stat-strip{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.stat-cell{background:white;padding:1.35rem 1.25rem;transition:background .15s;}
.stat-cell:hover{background:var(--off);}
.stat-val{font-size:1.7rem;font-weight:900;letter-spacing:-.04em;color:var(--ink);line-height:1;}
.stat-delta{font-size:.6rem;font-weight:600;color:var(--green);margin-top:2px;}
.stat-lbl{font-size:.63rem;color:var(--muted);margin-top:3px;}

/* ── TAKE RATE BARS ── */
.tr-row{display:flex;align-items:center;gap:1rem;padding:.9rem 1.1rem;border-radius:10px;border:1px solid var(--border);background:var(--off);margin-bottom:.6rem;transition:box-shadow .2s;}
.tr-row:hover{box-shadow:0 3px 14px rgba(0,0,0,.06);}
.tr-label{width:130px;font-size:.78rem;font-weight:700;color:var(--ink);flex-shrink:0;}
.tr-bars{flex:1;position:relative;height:24px;}
.tr-bg{height:24px;border-radius:6px;background:var(--border);position:absolute;left:0;right:0;top:0;}
.tr-pot{height:24px;border-radius:6px;background:rgba(18,160,92,.1);border:1.5px dashed rgba(18,160,92,.4);position:absolute;left:0;top:0;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:.6rem;font-weight:700;color:var(--green);}
.tr-cur{height:24px;border-radius:6px;background:linear-gradient(90deg,#1a60e8,#2d6bc4);position:absolute;left:0;top:0;z-index:2;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:.6rem;font-weight:700;color:white;min-width:40px;transition:width 1.2s cubic-bezier(.34,1.1,.64,1);}
.tr-mult{width:50px;text-align:right;font-size:.88rem;font-weight:900;color:var(--green);flex-shrink:0;}
.tr-gmv{width:82px;text-align:right;font-size:.62rem;color:var(--dim);flex-shrink:0;}

/* ── FLYWHEEL ── */
.flywheel{display:flex;align-items:center;justify-content:center;gap:.3rem;margin:1.5rem 0;flex-wrap:wrap;}
.fw-step{text-align:center;padding:.9rem .7rem;border:1px solid var(--border);border-radius:12px;background:white;flex:1;min-width:90px;transition:box-shadow .2s,transform .2s;cursor:default;}
.fw-step:hover{box-shadow:0 4px 18px rgba(0,0,0,.08);transform:translateY(-2px);}
.fw-icon{font-size:1.3rem;margin-bottom:.35rem;}
.fw-text{font-size:.65rem;font-weight:700;color:var(--ink2);line-height:1.35;}
.fw-arrow{font-size:.9rem;color:var(--blue);padding:0 .25rem;flex-shrink:0;font-weight:700;}

/* ── AGENT PILLS ── */
.agent-pill{font-size:.68rem;font-weight:600;padding:.3rem .75rem;border-radius:100px;border:1px solid var(--border);background:var(--off);color:var(--ink2);}

/* ── ROADBLOCK ── */
.rb{flex:1;padding:1.5rem;border-radius:14px;border:1px solid rgba(217,119,6,.2);background:rgba(217,119,6,.04);transition:transform .2s;}

.rb-icon{font-size:1.5rem;margin-bottom:.6rem;}
.rb-title{font-size:.88rem;font-weight:800;color:var(--amber);margin-bottom:.4rem;}
.rb-text{font-size:.76rem;color:var(--muted);line-height:1.65;}

/* ── DEPLOY TABLE ── */
.deploy-row{display:grid;grid-template-columns:190px 1fr 75px 130px 90px;gap:.75rem;padding:.85rem 1.1rem;align-items:center;border-bottom:1px solid var(--border);font-size:.78rem;}
.deploy-row.hdr{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);border-bottom:2px solid var(--border2);background:var(--off);border-radius:10px 10px 0 0;}
.d-bar{height:8px;border-radius:4px;background:var(--border);}
.d-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--green));}

/* ── INSIGHT ── */
.insight{background:var(--off);border:1px solid var(--border);border-radius:12px;padding:1rem 1.35rem;border-left:4px solid var(--blue);font-size:.78rem;color:var(--muted);line-height:1.7;}
.insight strong{color:var(--ink2);font-weight:600;}
.insight-lbl{font-size:.55rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:.35rem;display:block;}

/* ── CHECK LIST ── */
.chk{display:flex;align-items:flex-start;gap:.65rem;padding:.55rem 0;border-bottom:1px solid var(--border);font-size:.76rem;color:var(--muted);line-height:1.55;}
.chk:last-child{border-bottom:none;}
.chk-icon{flex-shrink:0;margin-top:1px;}

/* ── VERTICAL CARD ── */
.vert-card{background:white;border:1px solid var(--border);border-radius:12px;padding:.9rem .7rem;text-align:center;transition:box-shadow .2s,transform .2s;}
.vert-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.08);transform:translateY(-2px);}
.vert-icon{font-size:1.2rem;margin-bottom:.35rem;}
.vert-name{font-size:.6rem;font-weight:700;color:var(--ink2);margin-bottom:.3rem;line-height:1.3;}
.vert-gmv{font-size:1.1rem;font-weight:900;letter-spacing:-.03em;color:var(--blue);}
.vert-share{font-size:.55rem;color:var(--dim);margin-top:2px;}

/* ── MOAT STRIP ── */
.moat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.moat-cell{background:white;padding:1.5rem;transition:background .15s;}
.moat-cell:hover{background:var(--off);}
.moat-num{font-size:2rem;font-weight:900;letter-spacing:-.04em;color:var(--navy);line-height:1;margin-bottom:.35rem;}
.moat-lbl{font-size:.72rem;color:var(--muted);line-height:1.5;}

/* ── TEAM ── */
.team-card{background:var(--off);border:1px solid var(--border);border-radius:16px;padding:1.75rem;text-align:center;transition:transform .2s,box-shadow .2s;}
.team-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.09);}
.team-photo{width:76px;height:76px;border-radius:50%;object-fit:cover;object-position:center top;margin:0 auto .9rem;display:block;box-shadow:0 4px 18px rgba(0,0,0,.12);}
.team-name{font-size:.95rem;font-weight:800;letter-spacing:-.02em;}
.team-role{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin:.3rem 0 .75rem;}
.team-desc{font-size:.72rem;color:var(--muted);line-height:1.65;text-align:left;}
.team-tag{display:inline-block;margin-top:.75rem;font-size:.6rem;font-weight:600;padding:3px 10px;border-radius:100px;background:white;border:1px solid var(--border2);color:var(--ink2);}

/* ── PARTNER LOGO CHIPS ── */
.partner-cat-title{font-size:.58rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);padding-bottom:.7rem;border-bottom:1px solid var(--border);margin-bottom:.9rem;}
.partner-entry{margin-bottom:.7rem;}
.partner-entry-name{font-size:.78rem;font-weight:700;color:var(--ink2);}
.partner-entry-meta{font-size:.65rem;color:var(--dim);margin-top:1px;line-height:1.4;}

/* ── REV COMPARE ── */
.rev-compare{display:flex;align-items:center;justify-content:center;gap:1.5rem;padding:1.5rem 0;}
.rev-box{padding:1.4rem 2.25rem;border-radius:14px;text-align:center;}
.rev-box.cur{background:var(--blue-l);border:1px solid rgba(26,96,232,.2);}
.rev-box.pot{background:var(--green-l);border:1px solid rgba(18,160,92,.2);}
.rev-amount{font-size:2.6rem;font-weight:900;letter-spacing:-.04em;}
.rev-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px;}

/* ── CHART BOX ── */
.chart-box{background:white;border:1px solid var(--border);border-radius:14px;padding:1.75rem;}

/* ── CHART LEGEND ── */
.c-legend{display:flex;gap:1.25rem;margin-bottom:1.25rem;}
.c-leg-item{display:flex;align-items:center;gap:6px;font-size:.68rem;color:var(--muted);font-weight:500;}
.c-leg-dot{width:16px;height:3px;border-radius:2px;}

/* ── LOGO MARQUEE ── */
.marquee-wrap{overflow:hidden;position:relative;background:white;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:.9rem 0;}
.marquee-wrap::before,.marquee-wrap::after{content:'';position:absolute;top:0;bottom:0;width:100px;z-index:2;pointer-events:none;}
.marquee-wrap::before{left:0;background:linear-gradient(to right,white,transparent);}
.marquee-wrap::after{right:0;background:linear-gradient(to left,white,transparent);}
.marquee-track{display:flex;gap:0;animation:marquee 36s linear infinite;width:max-content;}

.logo-chip-name{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.logo-chip-badge{font-size:.48rem;font-weight:700;background:var(--blue);color:white;padding:1px 5px;border-radius:3px;}
.logo-chip-badge.g{background:var(--green);}

/* ── HERO SECTION ── */
#hero{
  min-height:100vh;padding-top:62px;
  background:var(--ink);
  display:flex;align-items:center;
  position:relative;overflow:hidden;
}
#hero::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;
}
.hero-inner{position:relative;z-index:1;padding:4rem 0;}
.hero-tag{
  display:inline-flex;align-items:center;gap:8px;

  border-radius:100px;padding:5px 14px 5px 8px;

}
.hero-dot{width:6px;height:6px;border-radius:50%;background:#34d399;animation:ldPulse 2s ease-in-out infinite;}
.hero-headline{

}
.hero-headline .accent{color:#60a5fa;}
.hero-sub{font-size:1rem;color:rgba(255,255,255,.55);font-weight:400;line-height:1.75;max-width:500px;margin-bottom:2.25rem;}
.hero-sub strong{color:rgba(255,255,255,.8);font-weight:600;}

/* ── DATAROOM BANNER ── */
.dataroom-banner{
  background:linear-gradient(135deg,rgba(26,96,232,.15),rgba(6,182,212,.1));
  border:1px solid rgba(26,96,232,.25);border-radius:14px;
  padding:1.25rem 1.75rem;margin-top:2.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:2rem;
}
.db-left{display:flex;align-items:center;gap:1rem;}
.db-icon{font-size:1.5rem;}
.db-title{font-size:.88rem;font-weight:700;color:white;}
.db-sub{font-size:.72rem;color:rgba(255,255,255,.45);margin-top:2px;}
.db-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,var(--blue),#06b6d4);color:white;

  padding:.65rem 1.5rem;border-radius:100px;border:none;cursor:pointer;
  text-decoration:none;white-space:nowrap;flex-shrink:0;
  box-shadow:0 0 24px rgba(26,96,232,.35);transition:opacity .2s,transform .15s;
}
.db-btn:hover{opacity:.85;transform:translateY(-1px);}

/* ── CTA SECTION ── */
#cta{padding:7rem 0;background:var(--ink);text-align:center;}
.cta-headline{font-size:clamp(2.2rem,4.2vw,3.8rem);font-weight:900;letter-spacing:-.04em;line-height:1.06;color:white;margin-bottom:1rem;}
.cta-sub{font-size:.92rem;color:rgba(255,255,255,.45);margin-bottom:2.5rem;}
.cta-btns{display:flex;gap:.9rem;justify-content:center;margin-bottom:2.5rem;}
.cta-contact{font-size:.78rem;color:rgba(255,255,255,.3);}
.cta-contact a{color:rgba(255,255,255,.5);text-decoration:none;transition:color .15s;}
.cta-contact a:hover{color:white;}

/* ── FOOTER ── */
footer{padding:1.5rem 2.5rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:.68rem;color:var(--dim);background:white;}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);}

/* ── SCROLL REVEAL ── */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .65s ease,transform .65s ease;}
.reveal.visible{opacity:1;transform:none;}
.d1{transition-delay:.08s}.d2{transition-delay:.16s}.d3{transition-delay:.24s}.d4{transition-delay:.32s}

/* ── RESPONSIVE ── */
@media(max-width:860px){
  .nav-links{display:none;} nav{padding:0 1.5rem;} .container{padding:0 1.5rem;}
  .g2,.g3,.g4{grid-template-columns:1fr;} .g7{grid-template-columns:repeat(4,1fr);} .g6{grid-template-columns:repeat(3,1fr);}

  .deploy-row{grid-template-columns:1fr 1fr;}
  .deploy-row.hdr{display:none;}
  .dataroom-banner{flex-direction:column;text-align:center;}
  .rev-compare{flex-direction:column;}
}
</style>

.eh-btn{
  border:1px solid #2c425f;background:#0f1a2e;color:#dbe6f5;font-size:12.5px;font-weight:600;
  padding:7px 13px;border-radius:8px;cursor:pointer;transition:all .12s;
}
.eh-btn:hover{border-color:#3b5a82;color:#fff}
.eh-btn.primary{background:#5F2EEA;border-color:#5F2EEA;color:#fff}
.eh-btn.primary.dirty{background:#EF4444;border-color:#EF4444}
.eh-btn.primary:disabled{opacity:.6;cursor:default}
.eh-conn{display:flex;align-items:center;gap:6px;font-size:11.5px;color:#8fa3c0}
.eh-conn i{width:8px;height:8px;border-radius:50%;background:#9aa;display:inline-block}
.eh-conn.ok i{background:#34d399} .eh-conn.warn i{background:#fbbf24} .eh-conn.err i{background:#f87171}

/* ---- Section editing affordances ---- */
body.portal-editor [data-eh-unit]{ position:relative; }
body.portal-editor section[data-eh-unit]{
  outline:1px dashed transparent; transition:outline-color .15s;
}
body.portal-editor section[data-eh-unit]:hover{ outline-color:rgba(26,96,232,.4); }
body.portal-editor section[data-eh-unit].eh-drag-over{ outline:2px dashed #1a60e8; }

/* per-section control chip (drag / hide) top-right */
.eh-ctl{
  position:absolute;top:8px;right:8px;z-index:50;display:none;gap:6px;
}
body.portal-editor section[data-eh-unit]:hover > .eh-ctl{display:flex}
.eh-ctl button{
  width:30px;height:30px;border-radius:8px;border:1px solid #d0d0cc;background:#fff;
  color:#0a0a08;cursor:pointer;font-size:14px;line-height:1;display:flex;
  align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.12);
  transition:all .12s;
}
.eh-ctl button:hover{background:#0a0a08;color:#fff;border-color:#0a0a08}
.eh-ctl .eh-handle{cursor:grab}
.eh-ctl .eh-handle:active{cursor:grabbing}

/* resize handle, bottom-right of section */
.eh-resize{
  position:absolute;right:4px;bottom:4px;width:18px;height:18px;z-index:50;
  display:none;cursor:nwse-resize;
  background:
    linear-gradient(135deg,transparent 50%,#1a60e8 50%,#1a60e8 60%,transparent 60%,transparent 72%,#1a60e8 72%,#1a60e8 82%,transparent 82%);
  border-radius:3px;opacity:.7;
}
body.portal-editor section[data-eh-unit]:hover > .eh-resize{display:block}

/* contenteditable focus ring */
body.portal-editor [contenteditable="true"]:hover{
  box-shadow:inset 0 0 0 1px rgba(26,96,232,.25);border-radius:3px;
}
body.portal-editor [contenteditable="true"]:focus{
  outline:2px solid #1a60e8;outline-offset:2px;border-radius:3px;background:rgba(26,96,232,.04);
}

/* hidden sections: greyed in editor, removed entirely for viewers */
section.eh-hidden{ opacity:.4; filter:grayscale(.8); position:relative; }
section.eh-hidden::after{
  content:"HIDDEN — click the eye to show";
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:#0a0a08;color:#fff;font:600 11px 'Hanken Grotesk',sans-serif;
  padding:4px 10px;border-radius:6px;z-index:60;
}
body.portal-viewer section.eh-hidden{ display:none !important; }

/* SortableJS ghost */
.eh-ghost{opacity:.35}
.eh-chosen{box-shadow:0 18px 50px rgba(0,0,0,.18)}

/* toast */
.eh-toast-wrap{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);z-index:9500;display:flex;flex-direction:column;gap:8px;align-items:center}
.eh-toast{
  font:600 13px 'Hanken Grotesk',sans-serif;color:#fff;padding:10px 16px;border-radius:9px;
  box-shadow:0 8px 28px rgba(0,0,0,.28);animation:ehFade .25s ease;
}
.eh-toast.ok{background:#12a05c} .eh-toast.err{background:#d93b3b} .eh-toast.info{background:#1a60e8}
@keyframes ehFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

</style>
</head>
<body class="portal-locked">
<main id="app" aria-busy="true"></main>
<script>
window.__PORTAL_CONFIG__ = {
  snapshotUrl: "data/snapshot.enc",
  workerUrl: "https://nbyula-investor-api.ankit-k-765.workers.dev",
  title: "Nbyula \u2014 Investor Portal \u00b7 Pre-Series A 2026",
  pbkdf2Iterations: 100000
};
</script>
<script id="portal-runtime-js">
/* =================================================================== *
 *  Investor Portal — editor runtime
 *  Password gate · AES viewer · Worker editor · live collaborative edit
 *  Injected into the public shell by build.py. Contains NO data.
 * =================================================================== */
(function () {
  "use strict";

  var CFG = window.__PORTAL_CONFIG__ || {};
  var WORKER_URL = (typeof CFG.workerUrl === "string" && CFG.workerUrl) ? CFG.workerUrl.replace(/\/+$/, "") : null;
  var SNAPSHOT_URL = CFG.snapshotUrl || "data/snapshot.enc";
  var ITER = CFG.pbkdf2Iterations || 100000;
  var SYNC_MS = 5000;

  var MODE = "locked";            // locked | viewer | editor
  var state = null;               // canonical state object
  var EDITOR_TOKEN = null;
  var viewerPw = null;            // kept in memory for viewer auto-refresh
  var encB64Cache = null;
  var lastSeenUpdatedAt = "";
  var myName = localStorage.getItem("ipf-name") || ("Editor-" + Math.floor(Math.random() * 900 + 100));

  var DIRTY = false;
  var dirtyUnits = Object.create(null);   // unitId -> true
  var orderDirty = false;
  var sortable = null;
  var syncTimer = null;

  var $app = document.getElementById("app");

  /* ------------------------------------------------------------------ */
  /*  utilities                                                          */
  /* ------------------------------------------------------------------ */
  function nowIso() { return new Date().toISOString().replace(/\.\d+Z$/, "Z"); }
  function el(tag, attrs, html) {
    var e = document.createElement(tag);
    if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
    if (html != null) e.innerHTML = html;
    return e;
  }
  function loadScript(src) {
    return new Promise(function (res, rej) {
      var s = document.createElement("script");
      s.src = src; s.onload = res; s.onerror = function () { rej(new Error("load failed: " + src)); };
      document.head.appendChild(s);
    });
  }
  function toast(msg, kind) {
    var wrap = document.querySelector(".eh-toast-wrap");
    if (!wrap) { wrap = el("div", { "class": "eh-toast-wrap" }); document.body.appendChild(wrap); }
    var t = el("div", { "class": "eh-toast " + (kind || "info") }, null);
    t.textContent = msg;
    wrap.appendChild(t);
    setTimeout(function () { t.style.opacity = "0"; t.style.transition = "opacity .3s"; setTimeout(function () { t.remove(); }, 320); }, 2600);
  }
  function setConn(kind, txt) {
    var c = document.getElementById("eh-conn");
    if (!c) return;
    c.className = "eh-conn " + kind;
    var s = c.querySelector("span"); if (s) s.textContent = txt;
  }

  /* ------------------------------------------------------------------ */
  /*  base64 + AES-256-CBC + PBKDF2 (openssl-compatible, byte-identical  */
  /*  to publish.sh / worker.js)                                         */
  /* ------------------------------------------------------------------ */
  function b64ToBytes(b64) {
    var bin = atob(b64.replace(/\s+/g, ""));
    var out = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }
  async function decryptOpenSSL(b64, password) {
    // The stored file is itself base64 ASCII (openssl -base64 -A). When fetched
    // over HTTP we get that ASCII directly.
    var bytes = b64ToBytes(b64);
    if (bytes.length < 16) throw new Error("ciphertext too short");
    var magic = String.fromCharCode.apply(null, bytes.slice(0, 8));
    if (magic !== "Salted__") throw new Error("bad header");
    var salt = bytes.slice(8, 16);
    var ct = bytes.slice(16);
    var passKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), { name: "PBKDF2" }, false, ["deriveBits"]);
    var derived = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: salt, iterations: ITER, hash: "SHA-256" }, passKey, 48 * 8);
    var keyBytes = new Uint8Array(derived, 0, 32);
    var ivBytes = new Uint8Array(derived, 32, 16);
    var aesKey = await crypto.subtle.importKey("raw", keyBytes, { name: "AES-CBC" }, false, ["decrypt"]);
    var plain = await crypto.subtle.decrypt({ name: "AES-CBC", iv: ivBytes }, aesKey, ct);
    return new TextDecoder().decode(plain);
  }

  /* ------------------------------------------------------------------ */
  /*  state normalization                                                */
  /*  Accepts either the initial seed {bodyHTML, appScript} or the        */
  /*  structured {order, sections, appScript}. Always returns structured. */
  /* ------------------------------------------------------------------ */
  function parseBodyToUnits(bodyHTML) {
    var tmp = el("div", null, bodyHTML);
    var order = [], sections = {};
    var idx = 0;
    Array.prototype.forEach.call(tmp.children, function (node) {
      if (node.nodeType !== 1) return;
      var id = node.id || ("u" + (idx++));
      node.setAttribute("data-eh-unit", id);
      order.push(id);
      sections[id] = { html: node.outerHTML, updatedAt: nowIso(), updatedBy: "seed" };
    });
    return { order: order, sections: sections };
  }
  function normalize(s) {
    s = s || {};
    if (!s.sections || !s.order) {
      var parsed = parseBodyToUnits(s.bodyHTML || "");
      s.order = parsed.order;
      s.sections = parsed.sections;
    }
    if (!s.meta) s.meta = { title: CFG.title || "Investor Portal" };
    if (typeof s.appScript !== "string") s.appScript = "";
    if (!s.version) s.version = 3;
    return s;
  }

  /* ------------------------------------------------------------------ */
  /*  rendering                                                          */
  /* ------------------------------------------------------------------ */
  function buildUnitNode(id, html) {
    var tmp = el("div", null, html);
    var node = tmp.firstElementChild;
    if (!node) { node = el("section", null, ""); }
    node.setAttribute("data-eh-unit", id);
    return node;
  }
  function destroyCharts() {
    if (!window.Chart || !Chart.getChart) return;
    document.querySelectorAll("canvas").forEach(function (c) {
      var ex = Chart.getChart(c); if (ex) { try { ex.destroy(); } catch (e) {} }
    });
  }
  function runAppScript(js) {
    if (!js) return;
    destroyCharts();
    requestAnimationFrame(function () {
      try { (new Function(js))(); }
      catch (e) { console.error("[portal] appScript error:", e); }
    });
  }
  function renderState(s) {
    state = normalize(s);
    if (state.meta && state.meta.title) document.title = state.meta.title;
    $app.innerHTML = "";
    state.order.forEach(function (id) {
      var unit = state.sections[id];
      if (!unit) return;
      $app.appendChild(buildUnitNode(id, unit.html));
    });
    lastSeenUpdatedAt = state.updatedAt || lastSeenUpdatedAt;
    runAppScript(state.appScript);
    document.body.classList.remove("portal-locked");
    $app.setAttribute("aria-busy", "false");
    if (MODE === "editor") decorateEditing();
  }

  /* ------------------------------------------------------------------ */
  /*  editor: which text elements become contenteditable                */
  /* ------------------------------------------------------------------ */
  // DIV is included but the leaf-only child check below means only DIVs whose
  // children are all inline (text divs like .section-kicker, stat numbers)
  // become editable — layout/wrapper DIVs with block children are skipped.
  var EDITABLE = ["H1", "H2", "H3", "H4", "H5", "H6", "P", "SPAN", "LI", "TD", "TH", "EM", "STRONG", "B", "I", "A", "LABEL", "FIGCAPTION", "BLOCKQUOTE", "DT", "DD", "DIV"];
  var INLINE_OK = ["SPAN", "STRONG", "EM", "B", "I", "BR", "SUP", "SUB", "SMALL", "A", "U"];
  var SKIP_SEL = "canvas,svg,script,style,.eh-ctl,.eh-resize,.eh-bar";
  function isEditable(node) {
    if (!node || node.nodeType !== 1 || EDITABLE.indexOf(node.tagName) === -1) return false;
    if (node.closest(SKIP_SEL)) return false;
    if (!node.textContent.trim()) return false;
    var kids = node.childNodes;
    for (var i = 0; i < kids.length; i++) {
      var n = kids[i];
      if (n.nodeType === 1 && INLINE_OK.indexOf(n.tagName) === -1) return false;
    }
    return true;
  }

  function decorateUnit(unitNode) {
    var id = unitNode.getAttribute("data-eh-unit");
    var isNav = unitNode.tagName === "NAV";
    var isSection = unitNode.tagName === "SECTION";

    // contenteditable on text blocks
    unitNode.querySelectorAll("*").forEach(function (n) {
      if (isEditable(n)) n.setAttribute("contenteditable", "true");
    });
    if (isEditable(unitNode)) unitNode.setAttribute("contenteditable", "true");

    if (!isSection) return;  // only sections get drag/resize/hide chrome

    // control chip (drag + hide)
    if (!unitNode.querySelector(":scope > .eh-ctl")) {
      var ctl = el("div", { "class": "eh-ctl" });
      var drag = el("button", { "class": "eh-handle", title: "Drag to reorder" }, "☰");
      var hide = el("button", { "class": "eh-hide", title: "Hide / show this section" }, "👁");
      hide.addEventListener("click", function (ev) {
        ev.stopPropagation();
        unitNode.classList.toggle("eh-hidden");
        markUnitDirty(id);
      });
      ctl.appendChild(drag); ctl.appendChild(hide);
      unitNode.appendChild(ctl);
    }
    // resize handle
    if (!unitNode.querySelector(":scope > .eh-resize")) {
      var rz = el("div", { "class": "eh-resize", title: "Drag to resize" });
      attachResize(rz, unitNode, id);
      unitNode.appendChild(rz);
    }
  }

  function decorateEditing() {
    Array.prototype.forEach.call($app.children, function (n) {
      if (n.nodeType === 1) decorateUnit(n);
    });
    initSortable();
  }

  function attachResize(handle, unitNode, id) {
    handle.addEventListener("pointerdown", function (e) {
      e.preventDefault(); e.stopPropagation();
      var container = unitNode.querySelector(".container") || unitNode;
      var startX = e.clientX, startY = e.clientY;
      var startW = container.getBoundingClientRect().width;
      var startH = unitNode.getBoundingClientRect().height;
      handle.setPointerCapture(e.pointerId);
      function move(ev) {
        var w = Math.max(320, Math.round(startW + (ev.clientX - startX)));
        var h = Math.max(80, Math.round(startH + (ev.clientY - startY)));
        container.style.maxWidth = w + "px";
        container.style.marginLeft = "auto"; container.style.marginRight = "auto";
        unitNode.style.minHeight = h + "px";
      }
      function up(ev) {
        handle.releasePointerCapture(e.pointerId);
        handle.removeEventListener("pointermove", move);
        handle.removeEventListener("pointerup", up);
        markUnitDirty(id);
      }
      handle.addEventListener("pointermove", move);
      handle.addEventListener("pointerup", up);
    });
  }

  function initSortable() {
    if (!window.Sortable) return;
    if (sortable) { try { sortable.destroy(); } catch (e) {} sortable = null; }
    sortable = window.Sortable.create($app, {
      draggable: "section[data-eh-unit]",
      handle: ".eh-handle",
      animation: 160,
      ghostClass: "eh-ghost",
      chosenClass: "eh-chosen",
      onEnd: function () { orderDirty = true; setDirty(true); }
    });
  }

  /* ------------------------------------------------------------------ */
  /*  dirty tracking                                                     */
  /* ------------------------------------------------------------------ */
  function markUnitDirty(id) { if (id) dirtyUnits[id] = true; setDirty(true); }
  function setDirty(v) {
    DIRTY = v;
    var btn = document.getElementById("eh-save");
    if (btn) { btn.classList.toggle("dirty", v); btn.textContent = v ? "Save changes •" : "Saved"; }
  }

  /* ------------------------------------------------------------------ */
  /*  serialization                                                      */
  /* ------------------------------------------------------------------ */
  function serializeUnit(unitNode) {
    var clone = unitNode.cloneNode(true);
    clone.querySelectorAll(".eh-ctl,.eh-resize").forEach(function (n) { n.remove(); });
    clone.querySelectorAll("[contenteditable]").forEach(function (n) { n.removeAttribute("contenteditable"); });
    clone.classList.remove("eh-chosen", "eh-ghost", "eh-drag-over");
    return clone.outerHTML;
  }
  function currentOrder() {
    var ids = [];
    Array.prototype.forEach.call($app.children, function (n) {
      if (n.nodeType === 1 && n.getAttribute("data-eh-unit")) ids.push(n.getAttribute("data-eh-unit"));
    });
    return ids;
  }
  function unitNodeById(id) { return $app.querySelector('[data-eh-unit="' + (window.CSS && CSS.escape ? CSS.escape(id) : id) + '"]'); }

  /* ------------------------------------------------------------------ */
  /*  worker calls                                                       */
  /* ------------------------------------------------------------------ */
  async function workerJson(path, body) {
    var r = await fetch(WORKER_URL + path, {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body)
    });
    return r;
  }
  async function fetchRemoteState() {
    var r = await workerJson("/api/snapshot", { token: EDITOR_TOKEN });
    if (r.status === 401) { sessionExpired(); throw new Error("unauthorized"); }
    if (!r.ok) throw new Error("snapshot HTTP " + r.status);
    var j = await r.json();
    return normalize(j.state);
  }
  function sessionExpired() {
    sessionStorage.removeItem("ipf-token"); EDITOR_TOKEN = null;
    toast("Session expired — reload and re-enter the editor password.", "err");
  }

  /* ------------------------------------------------------------------ */
  /*  SAVE — section-level merge so two editors don't clobber            */
  /* ------------------------------------------------------------------ */
  async function saveNow() {
    if (MODE !== "editor" || !WORKER_URL || !EDITOR_TOKEN) { toast("Editor/worker not configured.", "err"); return; }
    var btn = document.getElementById("eh-save");
    if (btn) { btn.disabled = true; btn.textContent = "Saving…"; }
    try {
      var remote = await fetchRemoteState();           // freshest base
      var merged = remote;
      // my edited sections win
      Object.keys(dirtyUnits).forEach(function (id) {
        var node = unitNodeById(id);
        if (!node) return;
        merged.sections[id] = { html: serializeUnit(node), updatedAt: nowIso(), updatedBy: myName };
      });
      // order: mine if I reordered, else keep remote but append any new ids
      if (orderDirty) {
        merged.order = currentOrder();
      } else {
        var have = {}; merged.order.forEach(function (i) { have[i] = 1; });
        currentOrder().forEach(function (i) { if (!have[i]) merged.order.push(i); });
      }
      // keep appScript + meta from whoever has them (charts unchanged here)
      merged.appScript = remote.appScript || state.appScript || "";
      merged.meta = state.meta || merged.meta;
      merged.version = 3;
      merged.updatedAt = nowIso();
      merged.updatedBy = myName;

      var r = await workerJson("/api/commit", { token: EDITOR_TOKEN, state: merged, message: "edit by " + myName });
      if (r.status === 401) { sessionExpired(); return; }
      if (!r.ok) { var t = await r.text(); throw new Error("HTTP " + r.status + " " + t); }
      var j = await r.json();

      // adopt merged as truth; reflect other editors' non-conflicting changes
      applyRemoteUnits(merged, {});      // dirty already merged in, safe to apply all
      state = merged;
      dirtyUnits = Object.create(null); orderDirty = false; setDirty(false);
      lastSeenUpdatedAt = merged.updatedAt;
      toast("Saved ✓  (published, live in ~30s)", "ok");
    } catch (e) {
      toast("Save failed: " + (e.message || e), "err");
    } finally {
      if (btn) { btn.disabled = false; setDirty(DIRTY); }
    }
  }

  /* ------------------------------------------------------------------ */
  /*  apply remote units into the DOM without disturbing edited ones     */
  /* ------------------------------------------------------------------ */
  function applyRemoteUnits(remote, skip) {
    remote = normalize(remote);
    var needFull = false;

    // patch / insert
    remote.order.forEach(function (id) {
      if (skip[id]) return;
      var ru = remote.sections[id]; if (!ru) return;
      var node = unitNodeById(id);
      if (!node) { needFull = true; return; }                 // new section appeared
      if (serializeUnit(node) === ru.html) return;            // unchanged
      if (node.querySelector("canvas")) { needFull = true; return; } // chart section -> full rerender
      var fresh = buildUnitNode(id, ru.html);
      node.replaceWith(fresh);
      decorateUnit(fresh);
    });

    // reorder to match remote (only if user hasn't manually reordered)
    if (!orderDirty) {
      var desired = remote.order.filter(function (id) { return !!unitNodeById(id); });
      desired.forEach(function (id) {
        var node = unitNodeById(id);
        if (node) $app.appendChild(node);   // appends in order => final order == desired
      });
    }

    if (needFull) {
      // full re-render (charts changed or new sections). Preserves my dirty units
      // only if none are dirty; if some are dirty we keep DOM and skip.
      if (Object.keys(dirtyUnits).length === 0) {
        renderState(remote);
        if (MODE === "editor") { /* decorateEditing already called in renderState */ }
      }
    } else {
      initSortable();
    }
  }

  /* ------------------------------------------------------------------ */
  /*  auto-sync (editor) + auto-refresh (viewer)                         */
  /* ------------------------------------------------------------------ */
  function startEditorSync() {
    if (syncTimer) clearInterval(syncTimer);
    syncTimer = setInterval(async function () {
      if (MODE !== "editor" || !EDITOR_TOKEN) return;
      // don't yank text the user is actively typing into
      if (document.activeElement && document.activeElement.isContentEditable) return;
      try {
        var remote = await fetchRemoteState();
        if (!remote.updatedAt || remote.updatedAt === lastSeenUpdatedAt) return;
        if (remote.updatedBy === myName) { lastSeenUpdatedAt = remote.updatedAt; return; }
        applyRemoteUnits(remote, dirtyUnits);
        lastSeenUpdatedAt = remote.updatedAt;
        toast("Synced changes from " + (remote.updatedBy || "your collaborator"), "info");
      } catch (e) { /* transient; ignore */ }
    }, SYNC_MS);
  }
  function startViewerRefresh() {
    if (syncTimer) clearInterval(syncTimer);
    syncTimer = setInterval(async function () {
      if (MODE !== "viewer" || !viewerPw) return;
      try {
        var enc = await fetch(SNAPSHOT_URL, { cache: "no-store" }).then(function (r) { return r.text(); });
        if (enc === encB64Cache) return;
        var json = await decryptOpenSSL(enc, viewerPw);
        var s = normalize(JSON.parse(json));
        if (s.updatedAt && s.updatedAt !== lastSeenUpdatedAt) { encB64Cache = enc; renderState(s); }
      } catch (e) { /* ignore */ }
    }, 20000);
  }

  /* ------------------------------------------------------------------ */
  /*  mode entry                                                         */
  /* ------------------------------------------------------------------ */
  async function enterEditor(token, remoteState) {
    EDITOR_TOKEN = token;
    sessionStorage.setItem("ipf-token", token);
    MODE = "editor";
    document.body.classList.remove("portal-locked", "portal-viewer");
    document.body.classList.add("portal-editor");
    try { await loadScript("https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"); } catch (e) {}
    renderState(remoteState);
    buildToolbar();
    setConn("ok", "editor — live");
    startEditorSync();
    // delegated input listener => mark the edited section dirty
    $app.addEventListener("input", function (ev) {
      var unit = ev.target.closest && ev.target.closest("[data-eh-unit]");
      if (unit) markUnitDirty(unit.getAttribute("data-eh-unit"));
    });
    window.addEventListener("beforeunload", function (ev) { if (DIRTY) { ev.preventDefault(); ev.returnValue = ""; } });
  }
  function enterViewer(s, pw) {
    MODE = "viewer"; viewerPw = pw;
    document.body.classList.remove("portal-locked", "portal-editor");
    document.body.classList.add("portal-viewer");
    renderState(s);
    startViewerRefresh();
  }

  function buildToolbar() {
    if (document.querySelector(".eh-bar")) return;
    var bar = el("div", { "class": "eh-bar" });
    bar.innerHTML =
      '<span class="eh-badge">EDITOR</span>' +
      '<span class="eh-conn ok" id="eh-conn"><i></i><span>editor — live</span></span>' +
      '<span class="eh-name">editing as <b id="eh-whoami"></b> <button class="eh-btn" id="eh-rename" style="padding:3px 8px">rename</button></span>' +
      '<span class="eh-spacer"></span>' +
      '<button class="eh-btn" id="eh-help">How editing works</button>' +
      '<button class="eh-btn primary" id="eh-save">Saved</button>' +
      '<button class="eh-btn" id="eh-signout">sign out</button>';
    document.body.appendChild(bar);
    document.getElementById("eh-whoami").textContent = myName;
    document.getElementById("eh-save").addEventListener("click", saveNow);
    document.getElementById("eh-rename").addEventListener("click", function () {
      var n = prompt("Your name (shown to your collaborator on sync):", myName);
      if (n && n.trim()) { myName = n.trim(); localStorage.setItem("ipf-name", myName); document.getElementById("eh-whoami").textContent = myName; }
    });
    document.getElementById("eh-signout").addEventListener("click", function () {
      if (DIRTY && !confirm("You have unsaved edits. Sign out anyway?")) return;
      sessionStorage.removeItem("ipf-token"); location.reload();
    });
    document.getElementById("eh-help").addEventListener("click", function () {
      alert("EDITING\n\n• Click any text to edit it inline.\n• Hover a section: drag the ☰ handle to reorder, click 👁 to hide/show, drag the bottom-right corner to resize.\n• Click “Save changes” to publish. Your collaborator sees your saved changes within ~5 seconds.\n• You can both edit different sections at the same time safely. If you edit the SAME section, the last save wins.");
    });
  }

  /* ------------------------------------------------------------------ */
  /*  password gate                                                      */
  /* ------------------------------------------------------------------ */
  function promptPassword(errMsg, busy) {
    return new Promise(function (resolve) {
      var prev = document.querySelector(".pg-overlay");
      if (prev) prev.remove();
      var ov = el("div", { "class": "pg-overlay" });
      ov.innerHTML =
        '<div class="pg-card">' +
        '<div class="pg-brand"><span class="pg-dot"></span><b>Nbyula</b></div>' +
        '<div class="pg-title">Investor Portal</div>' +
        '<div class="pg-sub">Pre‑Series A 2026 · confidential. Enter your access password to continue.</div>' +
        '<input class="pg-input" type="password" id="pg-pw" placeholder="Access password" autofocus />' +
        '<button class="pg-btn" id="pg-go">Unlock</button>' +
        '<div class="pg-err" id="pg-err">' + (errMsg || "") + '</div>' +
        '<div class="pg-hint">Viewer password → read‑only. Editor password → live editing.</div>' +
        '</div>';
      document.body.appendChild(ov);
      var input = ov.querySelector("#pg-pw"), go = ov.querySelector("#pg-go");
      function submit() {
        var v = input.value; if (!v) return;
        go.disabled = true; go.textContent = "Checking…";
        ov.remove(); resolve(v);
      }
      go.addEventListener("click", submit);
      input.addEventListener("keydown", function (e) { if (e.key === "Enter") submit(); });
      setTimeout(function () { input.focus(); }, 30);
    });
  }

  async function enterDemo(seed) {
    MODE = "editor";
    document.body.classList.remove("portal-locked", "portal-viewer");
    document.body.classList.add("portal-editor");
    try { await loadScript("https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"); } catch (e) {}
    renderState(seed);
    buildToolbar();
    var b = document.getElementById("eh-save");
    if (b) b.textContent = "Demo — edits not saved";
    setConn("warn", "DEMO (local only)");
    $app.addEventListener("input", function (ev) {
      var unit = ev.target.closest && ev.target.closest("[data-eh-unit]");
      if (unit) markUnitDirty(unit.getAttribute("data-eh-unit"));
    });
    // in demo, Save just shows a toast
    var save = document.getElementById("eh-save");
    if (save) { save.onclick = function () { toast("This is a preview — connect the Worker to save for real.", "info"); }; }
  }

  async function boot() {
    if (!$app) return;
    document.title = CFG.title || document.title;

    // DEMO preview: no password, no worker, edits are local only
    if (window.__PORTAL_DEMO__ && window.__SEED__) { await enterDemo(window.__SEED__); return; }

    // resume an editor session if we have a cached token
    var cached = sessionStorage.getItem("ipf-token");
    if (cached && WORKER_URL) {
      try {
        var r = await fetch(WORKER_URL + "/api/snapshot", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: cached }) });
        if (r.ok) { var j = await r.json(); await enterEditor(cached, j.state); return; }
        sessionStorage.removeItem("ipf-token");
      } catch (e) { /* fall through to gate */ }
    }

    // pre-fetch the encrypted snapshot so the viewer path works even if the
    // worker is unreachable
    try { encB64Cache = await fetch(SNAPSHOT_URL, { cache: "no-store" }).then(function (r) { if (!r.ok) throw 0; return r.text(); }); }
    catch (e) { encB64Cache = null; }

    var lastErr = "";
    for (var attempt = 0; attempt < 8; attempt++) {
      var pw = await promptPassword(lastErr);
      // 1) try the worker (tells us editor vs viewer)
      if (WORKER_URL) {
        try {
          var a = await fetch(WORKER_URL + "/api/auth", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: pw }) });
          if (a.ok) {
            var aj = await a.json();
            if (aj.role === "editor" && aj.token) {
              var sn = await fetch(WORKER_URL + "/api/snapshot", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: aj.token }) });
              if (sn.ok) { var snj = await sn.json(); await enterEditor(aj.token, snj.state); return; }
              lastErr = "Editor OK but snapshot fetch failed (" + sn.status + ")."; continue;
            }
            // role viewer -> fall through to client-side decrypt with pw
          } else if (a.status === 401) {
            lastErr = "Wrong password.";
            // still try AES below in case worker secrets drifted
          }
        } catch (e) { /* worker unreachable -> AES path */ }
      }
      // 2) client-side AES decrypt (viewer)
      if (!encB64Cache) { lastErr = "Snapshot unavailable and worker unreachable."; continue; }
      try {
        var json = await decryptOpenSSL(encB64Cache, pw);
        enterViewer(normalize(JSON.parse(json)), pw);
        return;
      } catch (e2) { lastErr = "Wrong password."; }
    }
    document.body.innerHTML = '<div style="font:14px system-ui;padding:40px;color:#555">Too many attempts. Refresh to try again.</div>';
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();

</script>
